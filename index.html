<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Discord Embed Pro Generator</title>

  <!-- CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Style -->
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #313338;
      color: #dbdee1;
      overflow: hidden;
    }

    /* Scrollbar */
    .discord-scroll::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .discord-scroll::-webkit-scrollbar-track {
      background: #2b2d31;
    }

    .discord-scroll::-webkit-scrollbar-thumb {
      background: #1a1b1e;
      border-radius: 4px;
    }

    .discord-scroll::-webkit-scrollbar-thumb:hover {
      background: #111214;
    }

    /* Glass Header */
    .glass-header {
      background: rgba(35, 36, 40, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.2);
    }

    /* Input */
    .input-discord {
      background-color: #1e1f22;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .input-discord:focus {
      border-color: #5865f2;
      outline: none;
      box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.2);
    }

    /* Button */
    .btn-primary {
      background-color: #5865f2;
      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      background-color: #4752c4;
    }

    .btn-primary:active {
      transform: scale(0.95);
    }

    /* Embed Preview */
    .embed-preview-box {
      background-color: #2b2d31;
      border-radius: 4px;
      border-left: 4px solid #5865f2;
    }

    /* Tab */
    .tab-active {
      color: white;
      position: relative;
    }

    .tab-active::after {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 0;
      right: 0;
      height: 2px;
      background: #5865f2;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    /* ================= ICONS ================= */
    const Icons = {
      Plus: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
      ),

      Trash: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      ),

      Send: () => (
        <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      ),

      User: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      ),

      Image: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      ),

      Settings: () => (
        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0"/>
        </svg>
      )
    };

    /* ================= INPUT COMPONENT ================= */
    const EmbedInput = ({
      label,
      value,
      onChange,
      placeholder,
      type = "text"
    }) => {
      return (
        <div className="mb-5">
          <label className="block text-[11px] font-bold uppercase text-[#949ba4] mb-2 tracking-wide">
            {label}
          </label>

          {type === "textarea" ? (
            <textarea
              value={value || ""}
              onChange={(e) => onChange(e.target.value)}
              placeholder={placeholder}
              className="w-full input-discord rounded p-2.5 text-sm h-28 resize-none discord-scroll"
            />
          ) : (
            <input
              type={type}
              value={value || ""}
              onChange={(e) => onChange(e.target.value)}
              placeholder={placeholder}
              className="w-full input-discord rounded p-2.5 text-sm"
            />
          )}
        </div>
      );
    };
  </script>
</body>
  </html>

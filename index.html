<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Embed Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #313338; 
            color: #dbdee1; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .discord-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .discord-scroll::-webkit-scrollbar-track { background: #2b2d31; }
        .discord-scroll::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 4px; }
        .discord-scroll::-webkit-scrollbar-thumb:hover { background: #111214; }
        
        .glass-header {
            background: rgba(35, 36, 40, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.2);
        }

        .input-discord {
            background-color: #1e1f22;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .input-discord:focus {
            border-color: #5865f2;
            outline: none;
            box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.2);
        }

        .btn-primary {
            background-color: #5865f2;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-primary:hover { background-color: #4752c4; }
        .btn-primary:active { transform: scale(0.95); }

        .embed-preview-box {
            background-color: #2b2d31;
            border-radius: 4px;
            border-left: 4px solid #5865f2;
        }

        .tab-active {
            color: white;
            position: relative;
        }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 2px;
            background: #5865f2;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Modern SVG Icons
        const Icons = {
            Plus: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
            Send: () => <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>,
            User: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>,
            Image: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>,
            Settings: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        };

        const EmbedInput = ({ label, value, onChange, placeholder, type = "text" }) => (
            <div className="mb-5">
                <label className="block text-[11px] font-bold uppercase text-[#949ba4] mb-2 tracking-wide">{label}</label>
                {type === "textarea" ? (
                    <textarea 
                        value={value || ''} 
                        onChange={(e) => onChange(e.target.value)}
                        placeholder={placeholder}
                        className="w-full input-discord rounded p-2.5 text-sm outline-none text-[#dbdee1] h-28 resize-none discord-scroll"
                    />
                ) : (
                    <input 
                        type={type}
                        value={value || ''} 
                        onChange={(e) => onChange(e.target.value)}
                        placeholder={placeholder}
                        className="w-full input-discord rounded p-2.5 text-sm outline-none text-[#dbdee1]"
                    />
                )}
            </div>
        );

        const App = () => {
            const [webhookUrl, setWebhookUrl] = useState(() => localStorage.getItem('dc_webhook_url_pro') || "");
            const [content, setContent] = useState("");
            const [embeds, setEmbeds] = useState(() => {
                const saved = localStorage.getItem('dc_embeds_pro');
                return saved ? JSON.parse(saved) : [{ 
                    id: 'main',
                    title: '🚀 Your Title', 
                    description: 'Your Description',
                    url: '', color: '#5865f2',
                    author: { name: '', icon_url: '', url: '' },
                    footer: { text: 'Created By ZeaLoTT250', icon_url: '' },
                    image: { url: '' }, thumbnail: { url: '' },
                    fields: [],
                    timestamp: true
                }];
            });
            const [activeTab, setActiveTab] = useState('content');
            const [isSending, setIsSending] = useState(false);
            const [status, setStatus] = useState(null);

            useEffect(() => {
                localStorage.setItem('dc_webhook_url_pro', webhookUrl);
                localStorage.setItem('dc_embeds_pro', JSON.stringify(embeds));
            }, [webhookUrl, embeds]);

            const updateEmbed = (path, value) => {
                setEmbeds(prev => {
                    const newEmbeds = [...prev];
                    const keys = path.split('.');
                    if (keys.length === 1) {
                        newEmbeds[0][keys[0]] = value;
                    } else if (keys.length === 2) {
                        newEmbeds[0][keys[0]] = { ...newEmbeds[0][keys[0]], [keys[1]]: value };
                    }
                    return newEmbeds;
                });
            };

            const addField = () => {
                const newFields = [...(embeds[0].fields || []), { name: 'Field Name', value: 'Field Content', inline: true }];
                updateEmbed('fields', newFields);
            };

            const removeField = (index) => {
                const newFields = embeds[0].fields.filter((_, i) => i !== index);
                updateEmbed('fields', newFields);
            };

            const handleSend = async () => {
                if (!webhookUrl) return setStatus({ type: 'error', text: 'Enter Webhook URL!' });
                setIsSending(true);
                
                const payload = {
                    content: content || undefined,
                    embeds: embeds.map(e => ({
                        title: e.title || undefined,
                        description: e.description || undefined,
                        url: e.url || undefined,
                        color: parseInt(e.color.replace('#', ''), 16),
                        author: e.author?.name ? { name: e.author.name, icon_url: e.author.icon_url || undefined, url: e.author.url || undefined } : undefined,
                        image: e.image?.url ? { url: e.image.url } : undefined,
                        thumbnail: e.thumbnail?.url ? { url: e.thumbnail.url } : undefined,
                        footer: e.footer?.text ? { text: e.footer.text, icon_url: e.footer.icon_url || undefined } : undefined,
                        fields: e.fields?.length > 0 ? e.fields : undefined,
                        timestamp: e.timestamp ? new Date().toISOString() : undefined
                    }))
                };

                try {
                    const res = await fetch(webhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) setStatus({ type: 'success', text: 'Sent successfully!' });
                    else setStatus({ type: 'error', text: 'Failed to send. Check URL.' });
                } catch (e) {
                    setStatus({ type: 'error', text: 'Network error.' });
                }
                setIsSending(false);
                setTimeout(() => setStatus(null), 4000);
            };

            return (
                <div className="flex flex-col h-screen select-none">
                    {/* Header Modern */}
                    <header className="glass-header h-16 flex items-center px-6 gap-4 z-50">
                        <div className="flex items-center gap-2 text-[#5865f2] font-bold text-lg">
                            <div className="bg-[#5865f2] text-white p-1 rounded-md">
                                <Icons.Settings />
                            </div>
                            <span className="text-white tracking-tight">Embed<span className="text-[#5865f2]">Pro</span></span>
                        </div>
                        <div className="flex-1 flex gap-3 max-w-2xl mx-auto">
                            <input 
                                className="flex-1 bg-[#1e1f22] px-4 py-2 rounded-md text-sm outline-none border border-transparent focus:border-[#5865f2] transition-all text-gray-200"
                                placeholder="https://discord.com/api/webhooks/..."
                                value={webhookUrl}
                                onChange={(e) => setWebhookUrl(e.target.value)}
                            />
                            <button 
                                onClick={handleSend}
                                disabled={isSending}
                                className={`btn-primary px-6 py-2 rounded-md font-bold text-sm text-white flex items-center gap-2 ${isSending ? 'opacity-50 cursor-not-allowed' : ''}`}
                            >
                                {isSending ? <div className="animate-spin rounded-full h-4 w-4 border-2 border-white/20 border-t-white"></div> : <Icons.Send />}
                                {isSending ? 'SENDING...' : 'SEND'}
                            </button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Editor Sidebar */}
                        <aside className="w-[380px] bg-[#2b2d31] flex flex-col border-r border-[#1e1f22] shadow-xl z-40">
                            <nav className="flex px-4 pt-4 border-b border-[#1e1f22] gap-6 text-sm font-semibold text-[#949ba4]">
                                {['Content', 'Author', 'Fields', 'Media', 'Footer'].map(t => (
                                    <button 
                                        key={t}
                                        onClick={() => setActiveTab(t.toLowerCase())}
                                        className={`pb-3 transition-colors hover:text-white ${activeTab === t.toLowerCase() ? 'tab-active text-white' : ''}`}
                                    >
                                        {t}
                                    </button>
                                ))}
                            </nav>
                            
                            <div className="flex-1 overflow-y-auto p-6 discord-scroll">
                                {activeTab === 'content' && (
                                    <div className="animate-in fade-in duration-300">
                                        <EmbedInput label="Text Message (Outside embed)" value={content} onChange={setContent} type="textarea" placeholder="Example: @everyone Hello all!" />
                                        <hr className="my-6 border-[#3e4047]" />
                                        <EmbedInput label="Embed Title" value={embeds[0].title} onChange={(v) => updateEmbed('title', v)} placeholder="Main title..." />
                                        <EmbedInput label="Title URL" value={embeds[0].url} onChange={(v) => updateEmbed('url', v)} placeholder="Link when title is clicked..." />
                                        <EmbedInput label="Description" value={embeds[0].description} onChange={(v) => updateEmbed('description', v)} type="textarea" placeholder="Embed message content..." />
                                        <div className="mb-4">
                                            <label className="block text-[11px] font-bold uppercase text-[#949ba4] mb-2">Accent Color</label>
                                            <div className="flex gap-3">
                                                <input type="color" value={embeds[0].color} onChange={(e) => updateEmbed('color', e.target.value)} className="w-12 h-12 rounded cursor-pointer bg-transparent border-none" />
                                                <input value={embeds[0].color} onChange={(e) => updateEmbed('color', e.target.value)} className="flex-1 input-discord rounded px-3 text-sm font-mono uppercase" />
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'author' && (
                                    <div className="animate-in fade-in duration-300">
                                        <EmbedInput label="Author Name" value={embeds[0].author.name} onChange={(v) => updateEmbed('author.name', v)} placeholder="Example: Admin Bot" />
                                        <EmbedInput label="Author URL" value={embeds[0].author.url} onChange={(v) => updateEmbed('author.url', v)} placeholder="Link when name is clicked..." />
                                        <EmbedInput label="Author Icon (URL)" value={embeds[0].author.icon_url} onChange={(v) => updateEmbed('author.icon_url', v)} placeholder="https://..." />
                                    </div>
                                )}

                                {activeTab === 'fields' && (
                                    <div className="animate-in slide-in-from-left-2 duration-300">
                                        <button onClick={addField} className="w-full py-2.5 rounded bg-[#248046] hover:bg-[#1a6334] text-white font-bold text-xs flex items-center justify-center gap-2 mb-6 transition-colors shadow-lg">
                                            <Icons.Plus /> ADD FIELD
                                        </button>
                                        <div className="space-y-4">
                                            {(embeds[0].fields || []).map((f, i) => (
                                                <div key={i} className="bg-[#1e1f22] p-4 rounded-lg relative border border-transparent hover:border-gray-700 transition-all group">
                                                    <button onClick={() => removeField(i)} className="absolute top-2 right-2 p-1.5 text-gray-500 hover:text-red-500 transition-colors">
                                                        <Icons.Trash />
                                                    </button>
                                                    <input 
                                                        className="bg-transparent border-b border-gray-700 w-full text-sm font-bold text-white mb-2 outline-none focus:border-[#5865f2]" 
                                                        value={f.name}
                                                        onChange={(e) => {
                                                            const nf = [...embeds[0].fields]; nf[i].name = e.target.value; updateEmbed('fields', nf);
                                                        }}
                                                    />
                                                    <textarea 
                                                        className="bg-transparent w-full text-xs text-gray-300 outline-none resize-none h-16"
                                                        value={f.value}
                                                        onChange={(e) => {
                                                            const nf = [...embeds[0].fields]; nf[i].value = e.target.value; updateEmbed('fields', nf);
                                                        }}
                                                    />
                                                    <label className="flex items-center gap-2 mt-2 text-[10px] font-bold text-gray-500 cursor-pointer">
                                                        <input type="checkbox" checked={f.inline} onChange={(e) => {
                                                            const nf = [...embeds[0].fields]; nf[i].inline = e.target.checked; updateEmbed('fields', nf);
                                                        }} className="rounded-sm accent-[#5865f2]" /> INLINE FIELD
                                                    </label>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'media' && (
                                    <div className="animate-in fade-in duration-300">
                                        <div className="flex items-center gap-2 mb-6 p-3 bg-blue-500/10 border border-blue-500/20 rounded-md">
                                            <Icons.Image className="text-blue-400" />
                                            <p className="text-[10px] text-blue-200 leading-tight">Use direct image URLs (ending in .png, .jpg, .gif)</p>
                                        </div>
                                        <EmbedInput label="Large Image (Bottom)" value={embeds[0].image.url} onChange={(v) => updateEmbed('image.url', v)} placeholder="https://..." />
                                        <EmbedInput label="Thumbnail (Top Right)" value={embeds[0].thumbnail.url} onChange={(v) => updateEmbed('thumbnail.url', v)} placeholder="https://..." />
                                    </div>
                                )}

                                {activeTab === 'footer' && (
                                    <div className="animate-in fade-in duration-300">
                                        <EmbedInput label="Footer Text" value={embeds[0].footer.text} onChange={(v) => updateEmbed('footer.text', v)} placeholder="Very bottom part..." />
                                        <EmbedInput label="Footer Icon (URL)" value={embeds[0].footer.icon_url} onChange={(v) => updateEmbed('footer.icon_url', v)} placeholder="https://..." />
                                        <label className="flex items-center gap-3 p-4 bg-[#1e1f22] rounded-md cursor-pointer group">
                                            <input type="checkbox" checked={embeds[0].timestamp} onChange={(e) => updateEmbed('timestamp', e.target.checked)} className="w-5 h-5 accent-[#5865f2]" />
                                            <div className="flex flex-col">
                                                <span className="text-sm font-bold text-white">Show Timestamp</span>
                                                <span className="text-[10px] text-gray-500 uppercase font-bold">Displays current time</span>
                                            </div>
                                        </label>
                                    </div>
                                )}
                            </div>
                        </aside>

                        {/* Preview Section */}
                        <section className="flex-1 bg-[#313338] overflow-y-auto discord-scroll p-12 flex justify-center items-start">
                            <div className="w-full max-w-2xl relative">
                                {status && (
                                    <div className={`fixed bottom-8 right-8 px-6 py-4 rounded-lg shadow-2xl animate-bounce z-[100] border-l-4 flex items-center gap-3 ${status.type === 'success' ? 'bg-[#248046] border-green-300' : 'bg-[#da373c] border-red-300'}`}>
                                        <span className="font-bold text-sm text-white">{status.text}</span>
                                    </div>
                                )}

                                {/* Simuasi Discord Message */}
                                <div className="flex gap-4 group">
                                    <div className="w-11 h-11 rounded-full bg-[#5865f2] flex items-center justify-center flex-shrink-0 shadow-lg cursor-pointer">
                                        <Icons.User />
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-center gap-2 mb-1.5">
                                            <span className="font-semibold text-white hover:underline cursor-pointer">WEBHOOK NAME</span>
                                            <span className="bg-[#5865f2] text-[10px] px-1.5 py-0.5 rounded-[3px] font-bold text-white uppercase tracking-tight flex items-center gap-1 shadow-sm">
                                                <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                                                BOT
                                            </span>
                                            <span className="text-xs text-[#949ba4] font-medium ml-1">today</span>
                                        </div>
                                        
                                        {content && (
                                            <div className="text-[#dbdee1] text-sm whitespace-pre-wrap mb-2 leading-relaxed selection:bg-[#5865f2]/30">
                                                {content}
                                            </div>
                                        )}

                                        {/* Discord Embed UI */}
                                        <div className="embed-preview-box max-w-[520px] shadow-lg overflow-hidden" style={{ borderColor: embeds[0].color }}>
                                            <div className="p-4 flex gap-4">
                                                <div className="flex-1 min-w-0">
                                                    {/* Author */}
                                                    {embeds[0].author.name && (
                                                        <div className="flex items-center gap-2 mb-2">
                                                            {embeds[0].author.icon_url && <img src={embeds[0].author.icon_url} className="w-5 h-5 rounded-full object-cover" onError={(e) => e.target.style.display='none'} />}
                                                            <span className={`text-xs font-semibold ${embeds[0].author.url ? 'text-white hover:underline cursor-pointer' : 'text-white'}`}>
                                                                {embeds[0].author.name}
                                                            </span>
                                                        </div>
                                                    )}

                                                    {/* Title */}
                                                    {embeds[0].title && (
                                                        <div className={`text-base font-bold mb-2 break-words ${embeds[0].url ? 'text-[#00a8fc] hover:underline cursor-pointer' : 'text-white'}`}>
                                                            {embeds[0].title}
                                                        </div>
                                                    )}

                                                    {/* Description */}
                                                    {embeds[0].description && (
                                                        <div className="text-sm text-[#dbdee1] whitespace-pre-wrap leading-snug">
                                                            {embeds[0].description}
                                                        </div>
                                                    )}

                                                    {/* Fields Grid */}
                                                    {embeds[0].fields?.length > 0 && (
                                                        <div className="grid grid-cols-12 gap-x-4 gap-y-4 mt-4">
                                                            {embeds[0].fields.map((f, i) => (
                                                                <div key={i} className={f.inline ? "col-span-4" : "col-span-12"}>
                                                                    <div className="text-xs font-bold text-white mb-1">{f.name}</div>
                                                                    <div className="text-sm text-[#dbdee1] whitespace-pre-wrap">{f.value}</div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>

                                                {/* Thumbnail */}
                                                {embeds[0].thumbnail.url && (
                                                    <div className="w-20 h-20 flex-shrink-0">
                                                        <img src={embeds[0].thumbnail.url} className="w-full h-full rounded object-contain bg-black/5" onError={(e) => e.target.style.display='none'} />
                                                    </div>
                                                )}
                                            </div>

                                            {/* Big Image */}
                                            {embeds[0].image.url && (
                                                <div className="mt-2 px-4 pb-4">
                                                    <img src={embeds[0].image.url} className="rounded-md max-h-[300px] w-full object-contain bg-black/5" onError={(e) => e.target.style.display='none'} />
                                                </div>
                                            )}

                                            {/* Footer */}
                                            {(embeds[0].footer.text || embeds[0].timestamp) && (
                                                <div className="px-4 pb-4 flex items-center gap-2 text-[11px] text-[#dbdee1]">
                                                    {embeds[0].footer.icon_url && <img src={embeds[0].footer.icon_url} className="w-5 h-5 rounded-full object-cover" onError={(e) => e.target.style.display='none'} />}
                                                    <span className="font-medium">
                                                        {embeds[0].footer.text}
                                                        {embeds[0].footer.text && embeds[0].timestamp && ' • '}
                                                        {embeds[0].timestamp && 'Today at 2:30 PM'}
                                                    </span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
